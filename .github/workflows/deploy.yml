name: Deploy Laravel to VPS DashATTVN

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy-att
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -ex
            cd /www/wwwroot/dash.attvietnam.vn
            bash deploy.sh